<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <defs>
        <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="favBarGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="favBarGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
        </linearGradient>

        <filter id="favGlow">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background square with rounded corners -->
    <rect x="2" y="2" width="60" height="60" rx="12" fill="#0b1121" stroke="url(#favGradient)" stroke-width="2"/>
    
    <!-- Simplified database icon -->
    <ellipse cx="32" cy="20" rx="18" ry="6" fill="url(#favGradient)" opacity="0.8"/>
    <path d="M14,20 L14,30 Q14,36 32,36 Q50,36 50,30 L50,20" fill="none" stroke="url(#favGradient)" stroke-width="2.5"/>
    <ellipse cx="32" cy="30" rx="18" ry="6" fill="none" stroke="url(#favGradient)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Data bars -->
    <rect x="24" y="22" width="4" height="10" rx="1" fill="url(#favBarGradient1)" filter="url(#favGlow)"/>
    <rect x="31" y="24" width="4" height="8" rx="1" fill="url(#favBarGradient2)" filter="url(#favGlow)"/>
    <rect x="38" y="20" width="4" height="12" rx="1" fill="url(#favBarGradient1)" filter="url(#favGlow)"/>

    <!-- Bottom data rows -->
    <line x1="20" y1="42" x2="44" y2="42" stroke="#60a5fa" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
    <line x1="22" y1="47" x2="42" y2="47" stroke="#60a5fa" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

    <!-- Letter D (for Datary) -->
    <text x="32" y="57" font-family="Inter, system-ui, -apple-system, sans-serif" 
          font-size="12" font-weight="700" fill="url(#favGradient)" text-anchor="middle" letter-spacing="0.5">
        D
    </text>
</svg>